version: "1.3.0"

build:
  maxIssues: 50
  weights:
    complexity: 2
    coroutines: 1.5
    style: 1
    comments: 1

processors:
  active: true
  exclude:
    - 'DetektProgressReport'
  include:
    - 'io.gitlab.arturbosch.detekt.processors.FilesProcessor'
    - 'io.gitlab.arturbosch.detekt.processors.KtFileProcessor'
    - 'io.gitlab.arturbosch.detekt.processors.ProjectStatisticsProcessor'
    - 'io.gitlab.arturbosch.detekt.processors.PropertyCountProcessor'
    - 'io.gitlab.arturbosch.detekt.processors.ThresholdsProcessor'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'DetektReport'
    - 'WriteFuelledReport'

output-reports:
  active: true
  exclude:
    - 'HtmlOutputReport'
    - 'SarifOutputReport'

comments:
  active: true
  AbsentOrWrongFileLicense:
    active: false
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false
  DeprecatedComment:
    active: false
  EndOfSentenceFormat:
    active: false
    endOfSentenceFormat: '([.?!][ \t\n\r\f<])|([.?!:]$)'
  UndocumentedPublicClass:
    active: false
    searchInDefaultCase: true
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

complexity:
  active: true
  CognitiveComplexFunction:
    active: false
  ComplexCondition:
    active: true
    threshold: 5
  ComplexFunction:
    active: true
    threshold: 15
  ComplexMethod:
    active: true
    threshold: 15
  LabeledExpression:
    active: false
    ignoredLabels: []
  LargeClass:
    active: true
    threshold: 300
  LongMethod:
    active: true
    threshold: 50
  LongParameterList:
    active: true
    threshold: 8
    ignoreDefaultParameters: false
  NamedArguments:
    active: false
    threshold: 5
  NestedBlockDepth:
    active: true
    threshold: 5
  ReplaceSafeCallChainWithRun:
    active: false
  TooManyFunctions:
    active: true
    thresholdInClasses: 15
    thresholdInFiles: 15
    thresholdInObjects: 15
    thresholdInInterfaces: 15
    ignoreDeprecated: false
    ignorePrivate: true
    ignoreOverridden: false

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  InjectDispatcher:
    active: true
    dispatcherNames:
      - 'IO'
      - 'Default'
      - 'Unconfined'
  RedundantSuspendModifier:
    active: true
  SleepInsteadOfDelay:
    active: true
  SuspendFunSwallowedCancellation:
    active: false
  SuspendFunctionWithCoroutinesRunner:
    active: true

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: '_|(ignore|expected|exception|ignored)'
  EmptyClassBlock:
    active: true
  EmptyDefaultBranch:
    active: true
  EmptyDoWhileBlock:
    active: true
  EmptyElseBlock:
    active: true
  EmptyFinallyBlock:
    active: true
  EmptyForBlock:
    active: true
  EmptyFunctionBlock:
    active: true
    ignoreOverriddenFunctions: true
  EmptyIfBlock:
    active: true
  EmptyInitBlock:
    active: true
  EmptyKtFile:
    active: true
  EmptyPrimaryConstructor:
    active: true
  EmptySecondaryConstructor:
    active: true
  EmptyTryBlock:
    active: true
  EmptyWhenBlock:
    active: true
  EmptyWhileBlock:
    active: true

exceptions:
  active: true
  ExceptionRaisedInUnexpectedLocation:
    active: true
    methodNames: ['toString', 'hashCode', 'equals', 'finalize']
  InstanceOfCheckForException:
    active: false
  NotImplementedDeclaration:
    active: false
  ObjectExtendsThrowable:
    active: false
  PrintStackTrace:
    active: true
  RethrowCaughtException:
    active: true
  ReturnFromFinally:
    active: true
    ignoreLabelCalled: false
  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - 'InterruptedException'
      - 'MalformedURLException'
      - 'NumberFormatException'
      - 'ParseException'
    allowedExceptionNameRegex: '_|(ex|exception|expected|ignored|throwable)'
  ThrowingExceptionFromFinally:
    active: true
  ThrowingExceptionInMainPosition:
    active: false
  ThrowingExceptionsWithoutMessageOrCause:
    active: true
    exceptions:
      - 'IllegalArgumentException'
      - 'IllegalStateException'
      - 'IOException'
  ThrowingNewInstanceOfTheSameException:
    active: true
  TooGenericExceptionCaught:
    active: false
    exceptionNames:
      - 'ArrayIndexOutOfBoundsException'
      - 'Error'
      - 'Exception'
      - 'IllegalMonitorStateException'
      - 'IndexOutOfBoundsException'
      - 'NullPointerException'
      - 'RuntimeException'
      - 'SecurityException'
      - 'Throwable'
    allowedExceptionNameRegex: '_|(ignore|expected)'
  TooGenericExceptionThrown:
    active: false
    exceptionNames:
      - 'Error'
      - 'Exception'
      - 'RuntimeException'
      - 'Throwable'

formatting:
  active: true
  AnnotationOnSeparateLine:
    active: false
  ChainWrapping:
    active: true
    commentSober: true
  CommentSpacing:
    active: true
  EnumEntryNameCase:
    active: true
  Filename:
    active: true
  FinalNewline:
    active: true
    insertFinalNewLine: true
  ImportOrdering:
    active: false
    layout: '*,^'
  Indentation:
    active: true
    indentSize: 4
    continuationIndentSize: 4
  MaximumLineLength:
    active: true
    maxLineLength: 200
  ModifierOrdering:
    active: true
  MultiLineIfElse:
    active: true
  NoBlankLineBeforeRbrace:
    active: true
  NoConsecutiveBlankLines:
    active: true
  NoConsecutiveComments:
    active: true
  NoEmptyClassBody:
    active: true
  NoEmptyFirstLineInMethodBlock:
    active: false
  NoLineBreakAfterElse:
    active: true
  NoLineBreakBeforeAssignment:
    active: false
  NoMultipleSpaces:
    active: true
  NoSemicolons:
    active: true
  NoTrailingSpaces:
    active: true
  NoUnitReturn:
    active: true
  NoUnusedImports:
    active: true
  NoWildcardImports:
    active: true
    packagesToUseImportOnDemandProperty: 'java.util.*,kotlinx.android.synthetic.*'
  PackageWrapping:
    active: true
    indentSize: 4
  ParameterListWrapping:
    active: true
    indentSize: 4
    maxLineLength: 200
  ParameterWrapping:
    active: true
    indentSize: 4
    maxLineLength: 200
  PropertyWrapping:
    active: true
    indentSize: 4
    maxLineLength: 200
  SpacingAroundAngleBrackets:
    active: true
  SpacingAroundAsteriskOperator:
    active: true
  SpacingAroundBinaryOperator:
    active: true
    binaryOperatorsMinOperandCount: 1
  SpacingAroundComma:
    active: true
  SpacingAroundCurlyBraces:
    active: true
  SpacingAroundDot:
    active: true
  SpacingAroundDoubleColon:
    active: true
  SpacingAroundKeyword:
    active: true
  SpacingAroundOperators:
    active: true
  SpacingAroundParentheses:
    active: true
  SpacingAroundRangeOperator:
    active: true
  SpacingAroundReflectionOperators:
    active: true
  SpacingAroundUnaryOperator:
    active: true
  SpacingBetweenAnnotations:
    active: true
  SpacingBetweenDeclarationsWithAnnotations:
    active: true
  SpacingBetweenDeclarationsWithComments:
    active: true
  StringTemplate:
    active: true
  StringTemplateMissingBraces:
    active: true
  TrailingComma:
    active: false
    allowTrailingComma: false
  TypeArgumentListSpacing:
    active: false
  UnusedImports:
    active: false
  VerticalWhitespace:
    active: true
    maxEmptyLines: 1
  Wrapping:
    active: true
    indentSize: 4

naming:
  active: true
  BooleanPropertyNaming:
    active: false
    allowedPattern: '^(is|has|are|should|can|will)'
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  ConstructorParameterNaming:
    active: true
    parameterPattern: '[a-z][a-zA-Z0-9]*'
    privateParameterPattern: '[a-z][a-zA-Z0-9]*'
    returnTypePattern: '^[A-Z][a-zA-Z0-9]*'
  EnumEntryNaming:
    active: true
    enumEntryPattern: '^[A-Z][_A-Z0-9]*'
  ForbiddenClassName:
    active: false
    classNames: []
  FunctionMaxLength:
    active: false
    maximumFunctionNameLength: 50
  FunctionMinLength:
    active: false
    minimumFunctionNameLength: 3
  FunctionNaming:
    active: true
    excludeAnnotation: true
    ignoreAnnotated: []
    ignoreOverridden: true
    namingPattern: '[a-z][a-zA-Z0-9]*'
  FunctionParameterNaming:
    active: true
    parameterPattern: '[a-z][a-zA-Z0-9]*'
    privateParameterPattern: '[a-z][a-zA-Z0-9]*'
  InvalidPackageDeclaration:
    active: true
    rootPackage: ''
  MatchingDeclarationName:
    active: true
    mustBeFirst: true
  MemberNameEqualsClassName:
    active: true
    ignoreOverriddenFunction: true
  NativeNaming:
    active: false
    exceptionVarType: 'CInteropPlatformType'
    varType: 'CInteropPlatformType'
  ObjectPropertyNaming:
    active: true
    constantPattern: '[A-Za-z][_A-Za-z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
    privatePropertyPattern: '(_)?[A-Za-z][_A-Za-z0-9]*'
  PackageNaming:
    active: true
    packagePattern: '^[a-z][a-zA-Z0-9]*(\.[a-z][a-zA-Z0-9]*)*'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
    privatePropertyPattern: '(_)?[A-Za-z][_A-Za-z0-9]*'
  VariableMaxLength:
    active: false
    maximumVariableNameLength: 50
  VariableMinLength:
    active: false
    minimumVariableNameLength: 1
  VariableNaming:
    active: true
    excludeAnnotation: true
    ignoreAnnotated: []
    ignoreOverridden: true
    variablePattern: '[a-z][a-zA-Z0-9]*'
    privateVariablePattern: '(_)?[a-z][a-zA-Z0-9]*'

performance:
  active: true
  ArrayPrimitive:
    active: true
  CouldBeSequence:
    active: false
    threshold: 3
  ForEachOnRange:
    active: true
  UnnecessaryPartOfBinaryExpression:
    active: false
  UnnecessaryTemporaryInstantiation:
    active: true

potential-bugs:
  active: true
  AvoidReferentialEquality:
    active: true
    forbiddenTypePatterns:
      - 'kotlin.String'
  CastToNullableType:
    active: false
  Deprecation:
    active: false
  DontDowncastCollectionTypes:
    active: false
  DoubleMutabilityForCollection:
    active: true
    mutationMethods:
      - 'add'
      - 'addAll'
      - 'clear'
      - 'remove'
      - 'removeAll'
      - 'retainAll'
      - 'set'
      - 'sort'
    stableTypes:
      - 'kotlin.collections.MutableList'
      - 'kotlin.collections.MutableMap'
      - 'kotlin.collections.MutableSet'
      - 'java.util.List'
      - 'java.util.Map'
      - 'java.util.Set'
  DuplicateCaseInWhenExpression:
    active: true
  EmptyCatchBlock:
    active: true
  ExitOutsideMain:
    active: false
  ExplicitGarbageCollectionCall:
    active: true
  HardcodedDeviceRule:
    active: false
  IgnoredReturnValue:
    active: true
    restrictToAnnotatedMethods: true
    returnValueAnnotations:
      - '*.CheckResult'
      - '*.Opts'
  ImplicitDefaultCharset:
    active: false
  ImplicitCallSequence:
    active: false
  InferredTypeLambda:
    active: false
  InvalidLanguageInStringLiteral:
    active: false
  IteratorHasNextCallsItemMethod:
    active: false
  IteratorNotThrowingNoSuchElementException:
    active: false
  LateinitUsage:
    active: false
    excludeAnnotatedProperties: []
    ignoreOnClassesPattern: ''
  MapGetWithNotNullAssertionOperator:
    active: false
  MissingPackageDeclaration:
    active: false
  MissingWhenCase:
    active: true
  NullableToStringCall:
    active: false
  RedundantElseInWhen:
    active: true
  RemoveRedundantQualifierName:
    active: true
  UnconditionalJumpStatementInLoop:
    active: false
  UnnecessaryNotNullCheck:
    active: false
  UnnecessarySafeCall:
    active: true
  UnreachableCatchBlock:
    active: false
  UnreachableCode:
    active: true
  UnsafeCallOnNullableType:
    active: true
  UnsafeCast:
    active: true
  UnusedUnaryOperator:
    active: false
  UselessPostfixExpression:
    active: false
  WrongEqualsTypeParameter:
    active: true

style:
  active: true
  AlsoCouldBeApply:
    active: false
  BracesOnIfStatements:
    active: false
    singleLine: 'never'
    multiLine: 'always'
  BracesOnWhenStatements:
    active: false
    singleLine: 'never'
    multiLine: 'always'
  CanBeNonNullable:
    active: false
  CascadingCallWrapping:
    active: false
    indentWith: '    '
    singleLineWith: ''
    multiLineWith: ' -> '
  ClassOrdering:
    active: false
  CollapsibleIfStatements:
    active: false
  DataClassContainsFunctions:
    active: false
    conversionFunctionPrefix: 'to'
  DataClassShouldBeImmutable:
    active: false
  DestructuringDeclaration:
    active: false
  DestructuringDeclarationWithMissingEntry:
    active: false
  EqualsOnSignatureLine:
    active: false
  EqualsNullCall:
    active: true
  ExplicitCollectionElementAccessMethod:
    active: false
  ExplicitItLambdaParameterBody:
    active: false
  ExpressionBodySyntax:
    active: false
    includeLineWrapping: false
  ForbiddenComment:
    active: true
    comments:
      - 'FIXME'
      - 'STOPSHIP'
      - 'TODO'
    reasons:
      - 'Forbidden fixme comment'
      - 'Forbidden stopship comment'
      - 'Forbidden todo comment'
  ForbiddenImport:
    active: false
    imports: []
  ForbiddenMethodCall:
    active: false
    methods: []
  ForbiddenVoid:
    active: false
    ignoreOverridden: false
    ignoreUsageInReturnType: false
  FunctionOnlyReturningConstant:
    active: true
    ignoreDestructuringDeclaration: true
    ignoreOverridden: true
  GlobalDeclarationInFile:
    active: false
  IdentifierName:
    active: false
  ImplicitDefaultCharset:
    active: false
  LambdaParameterNaming:
    active: false
  LibraryCodeMustSpecifyReturnType:
    active: true
  LibraryEntitiesShouldNotBePublic:
    active: false
  MandatoryBracesIfStatements:
    active: false
  MandatoryBracesInStatementsOrExpressions:
    active: false
  MaxChainedCallsOnSameLine:
    active: false
    maxChainedCalls: 5
  ModifierOrder:
    active: true
  MultilineLambdaItParameter:
    active: false
  NestedClassesVisibility:
    active: false
  NewLineAtEndOfFile:
    active: true
  NoTabs:
    active: true
  ObjectLiteralToLambda:
    active: false
  OptionalAbstractKeyword:
    active: true
  OptionalUnit:
    active: false
  PreferToOverPairSyntax:
    active: false
  ProtectedMemberInFinalClass:
    active: false
  RedundantExplicitType:
    active: false
  RedundantHigherOrderMapUsage:
    active: false
  RedundantVisibilityModifier:
    active: false
  ReturnCount:
    active: false
    max: 3
    excludedFunctions: 'equals'
    excludeLabeled: false
    excludeReturnFromLambda: true
    excludeGuardClauses: false
  SafeCast:
    active: true
  SerialVersionUIDInSerializableClass:
    active: false
  SpacingBetweenPackageAndImports:
    active: true
  ThrowsCount:
    active: false
    max: 2
    excludeGuardClauses: true
  TrailingWhitespace:
    active: false
  TripleEquals:
    active: true
  UnderscoresInNumericLiterals:
    active: false
    acceptableLength: 5
  UnnecessaryAbstractClass:
    active: false
    allowInInterfaces: true
  UnnecessaryAnnotationUseSiteTarget:
    active: false
  UnnecessaryApply:
    active: false
  UnnecessaryBackticks:
    active: false
  UnnecessaryBracesAroundTrailingLambda:
    active: false
  UnnecessaryFilter:
    active: false
  UnnecessaryInheritance:
    active: true
  UnnecessaryInnerClass:
    active: false
  UnnecessaryLambda:
    active: false
  UnnecessaryParentheses:
    active: false
  UnnecessaryTemporaryObject:
    active: false
  UnusedImports:
    active: false
  UseAnyOrNoneInsteadOfFind:
    active: false
  UseArrayLiteralsInAnnotations:
    active: false
  UseCheckNotNull:
    active: false
  UseCheckOrError:
    active: false
  UseDataClass:
    active: false
    allowVars: false
  UseEmptyCounter:
    active: false
  UseIfEmpty:
    active: false
  UseIfBlankOrNotBlank:
    active: false
  UseIfNotBlankOrNotNull:
    active: false
  UseIsNullOrEmpty:
    active: false
  UseOrEmpty:
    active: false
  UseRequire:
    active: false
  UseRequireNotNull:
    active: false
  UselessCallOnNotNull:
    active: true
  UselessContainingSubstring:
    active: false
  UtilityClassWithPublicConstructor:
    active: false
  VarCouldBeVal:
    active: true
  WildcardImport:
    active: true
    excludeImports:
      - 'java.util.*'
      - 'kotlinx.android.synthetic.*'
